apiVersion: v1
kind: Pod
metadata:
  name: myfist-pod
spec:
  containers:
    - name: my-main-container
      image: nginx:1.29
      ports:
        - containerPort: 80
      volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
  initContainers:
    - name: my-init-container
      image: busybox
      command: 
        - sh
        - -c
        - |
          echo "<h1>hello from init container</h1>" >> /usr/share/nginx/html/index.html
      volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
  volumes:
    - name: html-volume
      emptyDir: {}    

  
