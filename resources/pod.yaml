apiVersion: v1
kind: Pod
metadata:
  name: myresourcepod
  labels:
    app: bluepod
spec:
  containers:
    - name: mycontainer
      image: nginx 
      ports:
        - containerPort: 80
  resources:
    requests:
      cpu: 250m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 128Mi
  