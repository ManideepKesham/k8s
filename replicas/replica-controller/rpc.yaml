apiVersion: v1
kind: ReplicationController
metadata:
  name: pod-rpc
spec:
  minReadySeconds: 5
  replicas: 3
  selector:
    app: env-pods
  template:
    metadata:
      name: myrpc-pod
      labels:
        app: env-pods
    spec:
      containers:
        - name: myrpc-container
          image: nginx
          ports:
            - containerPort: 80
          